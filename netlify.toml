# Netlify config — the Vite app lives in the hariharan-portfolio/ subfolder.
# command & publish are resolved relative to `base`.
[build]
  base = "hariharan-portfolio"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: serve index.html for any unknown path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
